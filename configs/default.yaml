map:
  width: 60
  height: 40
  cell_size: 1.0
  obstacles: []

start:
  x: 0
  y: 0

planner:
  max_steps: 30000
  random_seed: 42
  stagnation_steps: 20
  min_coverage_increment: 0.0001

method:
  name: rolling_gbnn
  heading_weight: 0.5
  uncovered_bonus: 0.25

gbnn:
  enabled: true
  template_matching_enabled: false
  template_match_weight: 0.35
  iterations_per_step: 1
  external_excitation: 1.0
  obstacle_inhibition: -2.0
  covered_input: 0.0
  neighbor_weight: 0.2
  transfer_beta: 0.6
  activity_min: -1.0
  activity_max: 1.0

rolling_optimizer:
  enabled: true
  use_global_strip_plan: false
  use_priority_strip: false
  use_strip_constraints: false
  mode_filtering_enabled: true
  mode_open_min_local_uncovered: 6
  mode_open_min_uncovered_neighbors: 4
  mode_open_max_obstacle_pressure: 0.15
  mode_junction_min_branches: 3
  mode_obstacle_edge_pressure: 0.35
  mode_corridor_max_neighbors: 3
  horizon: 3
  beam_width: 30
  record_candidate_count: 1000000
  record_tree_count: 1000000
  max_repeat_in_branch: 3
  allow_diagonal_normal: false
  allow_immediate_backtrack: false
  w_new_coverage: 8.0
  w_activity: 1.0
  w_direction: 4.0
  w_turn: 3.0
  w_repeat: 2.0
  w_dead_zone: 5.0
  w_obstacle: 1.5
  w_structure: 3.0
  w_branch_urgency: 12.0
  w_missed_branch: 45.0
  missed_branch_min_behind: 6
  missed_branch_full_behind: 18
  w_immediate_backtrack: 1000.0
  w_topology_zigzag: 30.0
  w_lateral_detour: 60.0
  topology_component_limit: 256
  topology_open_component_min: 18
  topology_open_run_min: 8
  topology_pocket_component_max: 10
  topology_full_return_cost: 18.0
  topology_detour_pocket_threshold: 0.55
  mode_weights:
    open_water:
      direction: 1.25
      turn_penalty: 1.2
      repeat_penalty: 1.2
      dead_zone_penalty: 1.15
      branch_urgency: 0.85
      missed_branch: 0.8
    junction_search:
      new_coverage: 1.1
      activity: 1.15
      structure: 1.25
      branch_urgency: 1.45
      missed_branch: 1.35
      direction: 0.85
      lateral_detour_penalty: 0.65
      strip_cross_penalty: 0.75
    corridor:
      direction: 1.15
      structure: 0.85
      turn_penalty: 0.85
      obstacle_penalty: 1.25
      dead_zone_penalty: 1.2
      branch_urgency: 1.2
    obstacle_edge:
      structure: 1.15
      branch_urgency: 1.25
      obstacle_penalty: 1.45
      dead_zone_penalty: 1.35
      repeat_penalty: 1.15
    pocket_entry:
      branch_urgency: 1.5
      dead_zone_penalty: 0.75
      obstacle_penalty: 1.2
      repeat_penalty: 1.25
    dead_zone:
      activity: 1.45
      repeat_penalty: 0.65
      dead_zone_penalty: 0.55
      obstacle_penalty: 0.85
    frontier_recovery:
      activity: 1.35
      repeat_penalty: 0.75
      dead_zone_penalty: 0.65
      direction: 0.8
    frontier_following:
      new_coverage: 1.05
      structure: 1.05

escape:
  enabled: true
  method: hybrid
  backtracking_enabled: true
  dijkstra_enabled: true
  backtracking_max_steps: 500
  dijkstra_max_expansion: 5000
  min_uncovered_neighbors: 1
  w_escape_distance: 1.0
  w_escape_repeat: 2.0
  w_escape_turn: 1.0
  w_escape_component_size: -1.5
  w_escape_future_potential: -1.0

output:
  root: outputs
  animation:
    enabled: true
    fps: 12
    max_frames: 300
    playback_speed: 1.0
