map:
  width: 60
  height: 40
  cell_size: 1.0
  obstacles: []

start:
  x: 0
  y: 0

planner:
  target_coverage_rate: 1.0
  max_steps: 30000
  random_seed: 42
  stagnation_steps: 20
  min_coverage_increment: 0.0001

gbnn:
  enabled: true
  iterations_per_step: 1
  external_excitation: 1.0
  obstacle_inhibition: -2.0
  covered_input: 0.0
  neighbor_weight: 0.2
  activity_decay: 0.8

rolling_optimizer:
  enabled: true
  horizon: 5
  beam_width: 30
  max_repeat_in_branch: 3
  allow_immediate_backtrack: false
  w_new_coverage: 8.0
  w_activity: 1.0
  w_direction: 4.0
  w_turn: 3.0
  w_repeat: 2.0
  w_dead_zone: 5.0
  w_obstacle: 1.5
  w_structure: 3.0

escape:
  enabled: true
  backtracking_enabled: true
  dijkstra_enabled: true
  backtracking_max_steps: 500
  dijkstra_max_expansion: 5000
  min_uncovered_neighbors: 1
  w_escape_distance: 1.0
  w_escape_repeat: 2.0
  w_escape_turn: 1.0
  w_escape_component_size: -1.5
  w_escape_future_potential: -1.0

output:
  root: outputs
