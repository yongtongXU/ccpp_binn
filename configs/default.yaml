map:
  width: 60
  height: 40
  cell_size: 1.0
  obstacles: []

start:
  x: 0
  y: 0

planner:
  max_steps: 30000
  random_seed: 42
  stagnation_steps: 20
  min_coverage_increment: 0.0001

method:
  name: rolling_gbnn
  heading_weight: 0.5
  uncovered_bonus: 0.25

gbnn:
  enabled: true
  template_matching_enabled: false
  template_match_weight: 0.35
  iterations_per_step: 1
  external_excitation: 1.0
  obstacle_inhibition: -2.0
  covered_input: 0.0
  neighbor_weight: 0.2
  transfer_beta: 0.6
  activity_min: -1.0
  activity_max: 1.0

rolling_optimizer:
  enabled: true
  use_global_strip_plan: true
  use_priority_strip: true
  horizon: 3
  beam_width: 30
  record_candidate_count: 1000000
  record_tree_count: 1000000
  max_repeat_in_branch: 3
  allow_immediate_backtrack: false
  w_new_coverage: 8.0
  w_activity: 1.0
  w_direction: 4.0
  w_turn: 3.0
  w_repeat: 2.0
  w_dead_zone: 5.0
  w_obstacle: 1.5
  w_structure: 3.0
  w_branch_urgency: 12.0
  w_missed_branch: 45.0
  missed_branch_min_behind: 6
  missed_branch_full_behind: 18
  w_immediate_backtrack: 1000.0

escape:
  enabled: true
  method: hybrid
  backtracking_enabled: true
  dijkstra_enabled: true
  backtracking_max_steps: 500
  dijkstra_max_expansion: 5000
  min_uncovered_neighbors: 1
  w_escape_distance: 1.0
  w_escape_repeat: 2.0
  w_escape_turn: 1.0
  w_escape_component_size: -1.5
  w_escape_future_potential: -1.0

output:
  root: outputs
  animation:
    enabled: true
    fps: 12
    max_frames: 300
    playback_speed: 1.0
